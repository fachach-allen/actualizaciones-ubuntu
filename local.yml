---
- name: Mantenimiento total de Ubuntu con REBOOT FORZADO
  hosts: localhost
  connection: local
  become: yes
  tasks:
    - name: 1. Actualizar repositorios e instalar actualizaciones (full-upgrade)
      apt:
        update_cache: yes
        upgrade: full

    - name: 2. Limpiar paquetes innecesarios (autoremove)
      apt:
        autoremove: yes

    - name: 3. Reiniciando equipo forzosamente para confirmar tarea
      reboot:
        msg: "Actualización de GitHub completada. Reiniciando ahora mismo..."
