---
- name: Mantenimiento total de Ubuntu con REBOOT FORZADO
  hosts: localhost
  connection: local
  become: yes
  tasks:
    - name: 1. Actualizar repositorios e instalar actualizaciones (full-upgrade)
      apt:
        update_cache: yes
        upgrade: full

    - name: 2. Limpiar paquetes innecesarios (autoremove)
      apt:
        autoremove: yes

    - name: 3. Reiniciar la computadora engañando al seguro de Ansible
      shell: sleep 2 && shutdown -r now
      async: 1
      poll: 0
